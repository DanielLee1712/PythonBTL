version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: customer_db
      MYSQL_USER: shop_user
      MYSQL_PASSWORD: shop_password
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_AUTHENTICATION_PLUGIN_DEFAULT: mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  cart_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: cart_db
      MYSQL_USER: shop_user
      MYSQL_PASSWORD: shop_password
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_AUTHENTICATION_PLUGIN_DEFAULT: mysql_native_password
    ports:
      - "3308:3306"
    volumes:
      - cart_mysql_data:/var/lib/mysql

  product_db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: shop_user
      POSTGRES_PASSWORD: shop_password
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5434:5432"
    volumes:
      - product_postgres_data:/var/lib/postgresql/data

  customer-service:
    build: ./customer-service
    command: sh -c "sleep 15 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./customer-service:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=customer_db
      - DB_USER=shop_user
      - DB_PASS=shop_password
      - DB_PORT=3306
    depends_on:
      - db

  product-service:
    build: ./product-service
    command: >
      sh -c "sleep 15 &&
             python manage.py makemigrations catalog &&
             python manage.py migrate &&
             python manage.py seed_categories &&
             python manage.py seed_products &&
             python manage.py runserver 0.0.0.0:8001"
    volumes:
      - ./product-service:/app
    ports:
      - "8001:8001"
    environment:
      - DB_HOST=product_db
      - DB_NAME=product_db
      - DB_USER=shop_user
      - DB_PASS=shop_password
      - DB_PORT=5432
    depends_on:
      - product_db

  neo4j:
    image: neo4j:5.12
    restart: always
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  ai-service:
    build: ./ai-service
    command: >
      sh -c "sleep 15 &&
             python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    volumes:
      - ./ai-service:/app
    ports:
      - "8002:8002"
    env_file:
      - ./ai-service/.env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - PRODUCT_SERVICE_PRODUCTS_URL=http://product-service:8001/api/v1/products/
      - PRODUCT_DB_HOST=product_db
    depends_on:
      - neo4j
      - product_db
      - product-service

  cart-service:
    build: ./cart-service
    command: sh -c "sleep 15 && python manage.py migrate && python manage.py runserver 0.0.0.0:8004"
    volumes:
      - ./cart-service:/app
    ports:
      - "8004:8004"
    environment:
      - DB_HOST=cart_db
      - DB_NAME=cart_db
      - DB_USER=shop_user
      - DB_PASS=shop_password
      - DB_PORT=3306
    depends_on:
      - cart_db

  api-gateway:
    build: ./api-gateway
    command: sh -c "sleep 15 && python manage.py runserver 0.0.0.0:8080"
    volumes:
      - ./api-gateway:/app
    ports:
      - "8080:8080"
    depends_on:
      - customer-service
      - product-service
      - ai-service
      - cart-service

volumes:
  mysql_data:
  cart_mysql_data:
  product_postgres_data:
  neo4j_data:
